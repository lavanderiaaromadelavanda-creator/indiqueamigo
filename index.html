<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indique um Amigo</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f9; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding: 20px 10px; 
            margin: 0; 
            min-height: 100vh;
        }
        .card { 
            background: white; 
            padding: 30px 20px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 450px;
        }
        h2 { color: #4a148c; text-align: center; margin: 0 0 5px 0; font-size: 22px; }
        .emoji-cesto { text-align: center; font-size: 30px; margin-bottom: 20px; }
        input { 
            width: 100%; 
            padding: 16px; 
            margin: 10px 0; 
            border: 2px solid #ddd; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        button { 
            width: 100%; 
            padding: 18px; 
            background-color: #4a148c; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px;
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px;
        }
        .footer { text-align: center; font-size: 12px; color: #aaa; margin-top: 25px; }
        
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:1000; }
        .modal-box { background:white; padding:30px; border-radius:20px; width:85%; max-width:320px; text-align:center; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .btn-ok { background:#4a148c; color:white; border:none; padding:12px 40px; border-radius:10px; font-size:16px; cursor:pointer; margin-top:20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>LAVANDERIA AROMA DE LAVANDA</h2>
    <div class="emoji-cesto">🧺</div>
    <input type="text" id="seuWhatsapp" placeholder="Seu WhatsApp (Ex: 11999999999)">
    <input type="text" id="nomeAmigo" placeholder="Nome do Amigo">
    <input type="text" id="whatsAmigo" placeholder="WhatsApp do Amigo (Ex: 11988888888)">
    <button id="btnEnviar" onclick="enviarIndicao()">ENVIAR INDICAÇÃO ✨</button>
</div>

<div class="footer">© 2026 Lavanderia Aroma de Lavanda</div>

<div id="modal">
    <div class="modal-box">
        <h4 id="tituloModal" style="color:#4a148c; margin-top:0;">Aviso</h4>
        <p id="msgModal"></p>
        <button class="btn-ok" onclick="fecharModal()">OK</button>
    </div>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwQW5_V-1iKGku2_mb-eaOVGKNSTbfzv8doIE4cO5L6sPXRgYHJUaacqfN0vr9c9LWejg/exec";

    function mostrarModal(msg) {
        document.getElementById('msgModal').innerText = msg;
        document.getElementById('modal').style.display = 'flex';
    }
    function fecharModal() { document.getElementById('modal').style.display = 'none'; }

    function enviarIndicao() {
        const btn = document.getElementById('btnEnviar');
        const dados = {
            seuWhatsapp: document.getElementById('seuWhatsapp').value,
            nomeAmigo: document.getElementById('nomeAmigo').value,
            whatsAmigo: document.getElementById('whatsAmigo').value.replace(/\D/g, '')
        };

        if(!dados.seuWhatsapp || !dados.nomeAmigo || !dados.whatsAmigo) {
            mostrarModal("Por favor, preencha todos os campos!");
            return;
        }

        btn.innerText = "Processando...";
        btn.disabled = true;

        fetch(URL_SCRIPT, {
            method: 'POST',
            body: JSON.stringify(dados)
        })
        .then(res => res.json())
        .then(res => {
            if (res.status === "existe") {
                mostrarModal("Ops! Este amigo já consta na nossa Agenda e já é nosso cliente. Indique outro amigo!");
            } else {
                // Link otimizado para abrir direto no App ou WhatsApp Web
                const mensagem = "Olá! Te indiquei na Lavanderia Aroma de Lavanda!";
                const linkZap = "https://api.whatsapp.com/send?phone=55" + dados.whatsAmigo + "&text=" + encodeURIComponent(mensagem);
                
                window.open(linkZap, '_blank');
                
                mostrarModal("Indicação registrada com sucesso!");
                document.getElementById('seuWhatsapp').value = "";
                document.getElementById('nomeAmigo').value = "";
                document.getElementById('whatsAmigo').value = "";
            }
        })
        .catch(err => mostrarModal("Erro ao conectar, tente novamente."))
        .finally(() => {
            btn.innerText = "ENVIAR INDICAÇÃO ✨";
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
