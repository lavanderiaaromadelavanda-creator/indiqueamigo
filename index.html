<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indique um Amigo</title>
    <style>
        /* Removi margens extras para subir o conteúdo ao topo */
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding-top: 10px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #4a148c; text-align: center; margin: 0 0 5px 0; }
        p { text-align: center; color: #666; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #4a148c; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .footer { text-align: center; font-size: 12px; color: #aaa; margin-top: 20px; }
        
        /* Modal estilizado */
        #meuModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000; }
        .modal-conteudo { background:white; padding:20px; border-radius:15px; width:80%; max-width:300px; text-align:center; }
    </style>
</head>
<body>

<div class="card">
    <h2>LAVANDERIA AROMA DE LAVANDA</h2>
    <p>Indique um amigo e ganhe descontos!</p>
    
    <input type="text" id="seuWhatsapp" placeholder="Seu WhatsApp (Ex: 11999999999)">
    <input type="text" id="nomeAmigo" placeholder="Nome do Amigo">
    <input type="text" id="whatsAmigo" placeholder="WhatsApp do Amigo (Ex: 11988888888)">
    
    <button onclick="enviarIndicao()">ENVIAR INDICAÇÃO ✨</button>
    
    <div class="footer">© 2026 Aroma de Lavanda</div>
</div>

<div id="meuModal">
    <div class="modal-conteudo">
        <h4 style="color:#4a148c; margin:0 0 10px 0;">Lavanderia Aroma de Lavanda</h4>
        <p id="textoModal"></p>
        <button onclick="fecharModal()" style="background:#4a148c; color:white; border:none; padding:10px 20px; border-radius:5px;">OK</button>
    </div>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxfky8rFP6bVyUwziy-dMANa5AVComxkS2RfSxfnoUH2ovPDb4xlKwUCCItLNKhpOP04Q/exec";

    function mostrarModal(texto) {
        document.getElementById('textoModal').innerText = texto;
        document.getElementById('meuModal').style.display = 'flex';
    }
    function fecharModal() {
        document.getElementById('meuModal').style.display = 'none';
    }

    function enviarIndicao() {
        const dados = {
            seuWhatsapp: document.getElementById('seuWhatsapp').value,
            nomeAmigo: document.getElementById('nomeAmigo').value,
            whatsAmigo: document.getElementById('whatsAmigo').value.replace(/\D/g, '')
        };

        fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify(dados) })
        .then(res => res.json())
        .then(res => {
            if (res.status === "existe") {
                mostrarModal("Olá! Estou usando a Lavanderia Aroma de Lavanda e lembrei de você! As roupas saem perfeitas e elas sempre fazem promoções incríveis para quem é cliente. Se você for lá lavar, me avisa!");
            } else {
                const linkZap = "https://wa.me/55" + dados.whatsAmigo + "?text=" + encodeURIComponent("Olá! Te indiquei na Lavanderia Aroma de Lavanda!");
                window.open(linkZap, '_blank');
                mostrarModal("Indicação registrada com sucesso!");
                document.getElementById('seuWhatsapp').value = "";
                document.getElementById('nomeAmigo').value = "";
                document.getElementById('whatsAmigo').value = "";
            }
        })
        .catch(() => mostrarModal("Erro ao enviar. Tente novamente."));
    }
</script>

</body>
</html>
