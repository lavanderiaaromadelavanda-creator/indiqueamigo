<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Indique um Amigo</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding-top: 10px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #4a148c; text-align: center; margin: 0 0 5px 0; font-size: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #4a148c; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        /* CSS do Modal (A caixinha personalizada) */
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000; }
        .modal-box { background:white; padding:20px; border-radius:15px; width:80%; max-width:300px; text-align:center; }
        .btn-ok { background:#4a148c; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; margin-top:15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>LAVANDERIA AROMA DE LAVANDA</h2>
    <input type="text" id="seuWhatsapp" placeholder="Seu WhatsApp">
    <input type="text" id="nomeAmigo" placeholder="Nome do Amigo">
    <input type="text" id="whatsAmigo" placeholder="WhatsApp do Amigo">
    <button id="btnEnviar" onclick="enviarIndicao()">ENVIAR INDICAÇÃO ✨</button>
</div>

<div id="modal">
    <div class="modal-box">
        <h4 style="color:#4a148c;">Aviso da Lavanderia</h4>
        <p id="msgModal"></p>
        <button class="btn-ok" onclick="fecharModal()">OK</button>
    </div>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwQW5_V-1iKGku2_mb-eaOVGKNSTbfzv8doIE4cO5L6sPXRgYHJUaacqfN0vr9c9LWejg/exec";

    function mostrarModal(msg) {
        document.getElementById('msgModal').innerText = msg;
        document.getElementById('modal').style.display = 'flex';
    }
    function fecharModal() { document.getElementById('modal').style.display = 'none'; }

    function enviarIndicao() {
        const btn = document.getElementById('btnEnviar');
        const dados = {
            seuWhatsapp: document.getElementById('seuWhatsapp').value,
            nomeAmigo: document.getElementById('nomeAmigo').value,
            whatsAmigo: document.getElementById('whatsAmigo').value.replace(/\D/g, '')
        };

        btn.innerText = "Processando...";
        fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify(dados) })
        .then(res => res.json())
        .then(res => {
            if (res.status === "existe") {
                mostrarModal("Ops! Este amigo já consta na nossa Agenda e já é nosso cliente. Tente indicar outro amigo!");
            } else {
                window.open("https://wa.me/55" + dados.whatsAmigo + "?text=Olá! Te indiquei na Lavanderia Aroma de Lavanda!", '_blank');
                mostrarModal("Indicação registrada com sucesso!");
                document.getElementById('seuWhatsapp').value = "";
                document.getElementById('nomeAmigo').value = "";
                document.getElementById('whatsAmigo').value = "";
            }
        })
        .finally(() => btn.innerText = "ENVIAR INDICAÇÃO ✨");
    }
</script>
</body>
</html>
