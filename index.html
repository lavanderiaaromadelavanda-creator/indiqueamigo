<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indique um Amigo</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding-top: 10px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #4a148c; text-align: center; margin: 0 0 5px 0; font-size: 20px; }
        p { text-align: center; color: #666; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #4a148c; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .footer { text-align: center; font-size: 12px; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>LAVANDERIA AROMA DE LAVANDA</h2>
    <p>Indique um amigo e ganhe descontos!</p>
    
    <input type="text" id="seuWhatsapp" placeholder="Seu WhatsApp (Ex: 11999999999)">
    <input type="text" id="nomeAmigo" placeholder="Nome do Amigo">
    <input type="text" id="whatsAmigo" placeholder="WhatsApp do Amigo (Ex: 11988888888)">
    
    <button onclick="enviarIndicao()">ENVIAR INDICAÇÃO ✨</button>
    
    <div class="footer">© 2026 Aroma de Lavanda</div>
</div>

<script>
    // --- COLE O SEU LINK DO APPS SCRIPT AQUI ABAIXO ---
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxgV7Lkr8Pb-ZJgh3j2We_hlCJfILlxJtA0qnBkESjNBf_5sSY-_QUNQ43ZjO4KX88/exec";

    function enviarIndicao() {
        const dados = {
            seuWhatsapp: document.getElementById('seuWhatsapp').value,
            nomeAmigo: document.getElementById('nomeAmigo').value,
            whatsAmigo: document.getElementById('whatsAmigo').value.replace(/\D/g, '')
        };

        // 1. Envia para a planilha
        fetch(URL_SCRIPT, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(dados)
        });

        // 2. Abre o WhatsApp do amigo logo em seguida
        const mensagem = "Olá! Te indiquei na Lavanderia Aroma de Lavanda!";
        const linkZap = "https://wa.me/55" + dados.whatsAmigo + "?text=" + encodeURIComponent(mensagem);
        window.open(linkZap, '_blank');

        // 3. Feedback visual
        alert("Indicação enviada! Abrindo WhatsApp...");
        
        // Limpar campos
        document.getElementById('seuWhatsapp').value = "";
        document.getElementById('nomeAmigo').value = "";
        document.getElementById('whatsAmigo').value = "";
    }
</script>

</body>
</html>
